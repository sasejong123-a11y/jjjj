<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn" aria-label="테마 변경">☀️</button>
    </div>
    <div class="container">
        <header>
            <h1>행운의 로또 번호 생성기</h1>
            <p>버튼을 눌러 당신의 행운 번호를 확인하세요!</p>
        </header>
        <main>
            <div class="lotto-numbers">
                <!-- 로또 번호가 여기에 표시됩니다. -->
            </div>
            <button id="generate-btn">번호 생성</button>
        </main>
        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mnjoqaev" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함 또는 업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </section>
        <section class="comment-section">
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productvuilder.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
        <footer>
            <p>&copy; 2024 행운의 로또 번호 생성기. All rights reserved.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
